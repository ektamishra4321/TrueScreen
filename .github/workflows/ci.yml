name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest scikit-learn
      - name: Unit tests (deterministic, no API keys)
        run: python -m pytest -q
      - name: Metrics pipeline gate (kappa math + converter on fixtures)
        run: python -m pytest -q tests/test_metrics_gate.py
